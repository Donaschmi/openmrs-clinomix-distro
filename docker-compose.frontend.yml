services:
  backend-build:
    image: maven:3.9-eclipse-temurin-17
    container_name: clinomx-backend-build
    working_dir: /project
    volumes:
      - ./backend:/project
      - maven-cache:/root/.m2
    command: mvn package -pl omod -am -DskipTests -q
    restart: "no"

  backend:
    #build: ./backend
    image: openmrs/openmrs-core:2.7.4
    container_name: clinomx-openmrs-backend
    ports:
      - "8080:8080"
    environment:
      OMRS_CONFIG_MODULE_WEB_ADMIN: "true"
      OMRS_CONFIG_AUTO_UPDATE_DATABASE: "true"
      OMRS_CONFIG_CREATE_TABLES: "true"
      OMRS_CONFIG_CONNECTION_SERVER: db
      OMRS_CONFIG_CONNECTION_DATABASE: openmrs
      OMRS_CONFIG_CONNECTION_USERNAME: openmrs
      OMRS_CONFIG_CONNECTION_PASSWORD: openmrs
    volumes:
      - ./backend/modules:/openmrs/data/modules
    depends_on:
      backend-build:
        condition: service_completed_successfully
      db:
        condition: service_started

  frontend:
    build: ./frontend
    container_name: clinomx-openmrs-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  db:
    image: mariadb:10.11.7
    container_name: clinomx-openmrs-db
    command: "mysqld --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci"
    environment:
      MYSQL_DATABASE: openmrs
      MYSQL_USER: openmrs
      MYSQL_PASSWORD: openmrs
      MYSQL_ROOT_PASSWORD: openmrs

volumes:
  omod-modules:
  maven-cache: